services:
  chord:
    build: .
    ports:
      - "8002:8000"
    volumes:
      - /home/luok/.cache/huggingface:/root/.cache/huggingface
    environment:
      - CHORD_MODEL=ubisoft/chord
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 2gb
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
